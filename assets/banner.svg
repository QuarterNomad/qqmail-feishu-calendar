<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="200" rx="12" fill="url(#bg)"/>
  <!-- Mail icon -->
  <g transform="translate(40, 60)">
    <rect x="0" y="10" width="70" height="50" rx="4" fill="none" stroke="#e94560" stroke-width="3"/>
    <polyline points="0,15 35,40 70,15" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="10" y="0" width="50" height="20" rx="3" fill="#e94560" opacity="0.3"/>
  </g>
  <!-- Arrow -->
  <g transform="translate(130, 75)">
    <line x1="0" y1="20" x2="50" y2="20" stroke="#4ecca3" stroke-width="3" stroke-linecap="round"/>
    <polyline points="40,12 50,20 40,28" fill="none" stroke="#4ecca3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- AI brain icon -->
  <g transform="translate(200, 55)">
    <circle cx="40" cy="45" r="35" fill="none" stroke="#4ecca3" stroke-width="3"/>
    <circle cx="40" cy="45" r="20" fill="#4ecca3" opacity="0.2"/>
    <circle cx="40" cy="45" r="8" fill="#4ecca3"/>
    <!-- neural connections -->
    <line x1="40" y1="20" x2="40" y2="30" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="60" x2="40" y2="70" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="45" x2="25" y2="45" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
    <line x1="55" y1="45" x2="65" y2="45" stroke="#4ecca3" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- Arrow 2 -->
  <g transform="translate(295, 75)">
    <line x1="0" y1="20" x2="50" y2="20" stroke="#4ecca3" stroke-width="3" stroke-linecap="round"/>
    <polyline points="40,12 50,20 40,28" fill="none" stroke="#4ecca3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Calendar icon -->
  <g transform="translate(365, 55)">
    <rect x="0" y="10" width="70" height="60" rx="6" fill="none" stroke="#e94560" stroke-width="3"/>
    <rect x="0" y="10" width="70" height="18" rx="6" fill="#e94560"/>
    <line x1="0" y1="28" x2="70" y2="28" stroke="#e94560" stroke-width="3"/>
    <line x1="20" y1="5" x2="20" y2="18" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="5" x2="50" y2="18" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
    <!-- calendar content -->
    <rect x="10" y="36" width="16" height="10" rx="2" fill="#4ecca3"/>
    <rect x="30" y="36" width="16" height="10" rx="2" fill="#e94560" opacity="0.5"/>
    <rect x="50" y="36" width="16" height="10" rx="2" fill="#e94560" opacity="0.5"/>
    <rect x="10" y="52" width="16" height="10" rx="2" fill="#e94560" opacity="0.5"/>
    <rect x="30" y="52" width="16" height="10" rx="2" fill="#4ecca3"/>
  </g>
  <!-- Title -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">qqmail-feishu-calendar</text>
  <!-- Subtitle -->
  <text x="300" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4ecca3">Never miss an interview again.</text>
</svg>
